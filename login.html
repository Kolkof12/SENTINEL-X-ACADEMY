<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel-X | بوابة الدخول المشفرة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;500;700&display=swap');
        
        body {
            background: #05070a;
            color: white;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 2px solid #fcd535;
            border-radius: 2.5rem;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
        }

        .input-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .input-box:focus-within {
            border-color: #fcd535;
            box-shadow: 0 0 15px rgba(252, 213, 53, 0.1);
        }

        .btn-gold {
            background: #fcd535;
            color: #000;
            font-weight: 900;
            transition: all 0.3s ease;
        }

        .btn-gold:hover {
            box-shadow: 0 0 25px rgba(252, 213, 53, 0.4);
            transform: translateY(-2px);
        }

        /* أنيميشن الخلفية */
        .grid-bg {
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(252, 213, 53, 0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(252, 213, 53, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <div class="login-card w-full max-w-[420px] p-12 relative mx-4">
        <div class="text-center mb-10">
            <div class="mb-4 inline-block px-4 py-1 rounded-full bg-[#fcd535]/10 border border-[#fcd535]/20 text-[#fcd535] text-[10px] font-bold tracking-[0.2em] uppercase">
                Aegis-Hive Protocol
            </div>
            <h1 style="font-family: 'Orbitron', sans-serif;" class="text-4xl font-black tracking-tighter text-white">
                SENTINEL-<span class="text-[#fcd535]">X</span>
            </h1>
            <p class="text-gray-500 text-[11px] uppercase tracking-[0.4em] mt-2">Private Trading Academy</p>
        </div>

        <form onsubmit="handleLogin(event)" class="space-y-6">
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mr-2">المعرف الشخصي</label>
                <div class="input-box flex items-center rounded-2xl px-4 py-4">
                    <i class="fas fa-user-shield text-[#fcd535]/50 ml-3"></i>
                    <input type="text" id="username" required placeholder="Yasser_75" 
                           class="bg-transparent w-full outline-none text-sm font-semibold text-white">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mr-2">مفتاح الوصول</label>
                <div class="input-box flex items-center rounded-2xl px-4 py-4">
                    <i class="fas fa-lock text-[#fcd535]/50 ml-3"></i>
                    <input type="password" id="password" required placeholder="••••••••" 
                           class="bg-transparent w-full outline-none text-sm font-semibold text-white">
                </div>
            </div>

            <button type="submit" class="btn-gold w-full py-4 rounded-2xl text-xs uppercase tracking-[0.2em] shadow-xl">
                فتح النظام الآمن <i class="fas fa-bolt mr-2"></i>
            </button>
        </form>

        <div class="mt-10 flex justify-between items-center text-[9px] text-gray-600 border-t border-white/5 pt-6 uppercase tracking-widest">
            <span>By @wxl_e</span>
            <span class="text-[#fcd535]/50 italic text-[8px]">Encrypted Session</span>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            const user = document.getElementById('username').value;
            
            // تخزين اسم المستخدم للجلسة
            localStorage.setItem('d_username', user);
            
            // الانتقال لصفحة التداول الرئيسية
            // ملاحظة: تأكد أن ملف المنصة اسمه index.html
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
